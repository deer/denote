name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --frozen

      - name: Verify
        run: deno task check

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Check for deploy-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - 'packages/denote/**'
              - 'docs/**'
              - 'deno.json'
              - '.github/workflows/**'

      - name: Install Deno
        if: steps.filter.outputs.deploy == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        if: steps.filter.outputs.deploy == 'true'
        run: deno install --frozen

      - name: Build
        if: steps.filter.outputs.deploy == 'true'
        run: deno task build

      - name: Upload to Deno Deploy
        if: steps.filter.outputs.deploy == 'true'
        uses: denoland/deployctl@v1
        with:
          project: "rvr-denote"
          entrypoint: "./_fresh/server.js"
          root: "docs/"
