name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format, lint, and type-check
        run: deno fmt --check && deno lint && deno check

      - name: Test with coverage
        run: deno test -A --coverage=.coverage

      - name: Generate coverage report
        run: deno coverage .coverage --lcov > lcov.info

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Check for deploy-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - 'packages/denote/**'
              - 'docs/**'
              - 'deno.json'
              - '.github/workflows/**'

      - name: Install Deno
        if: steps.filter.outputs.deploy == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        if: steps.filter.outputs.deploy == 'true'
        run: deno task build

      - name: Upload to Deno Deploy
        if: steps.filter.outputs.deploy == 'true'
        uses: denoland/deployctl@v1
        with:
          project: "rvr-denote"
          entrypoint: "./_fresh/server.js"
          root: "docs/"
